# Rust language profile (Plan 05 Sec.3.1).
#
# Statically compiled with the same idiomatic-error-handling shape as Go
# (DEEPTHINK_10): `Result`/`?`-propagation chains and exhaustive `match`
# arms inflate cyclomatic complexity without adding real risk, so
# thresholds are widened relative to the generic default.
language: rust
provenance: "corpus P90/P95 estimate, top OSS Rust repos, 2025 snapshot; DEEPTHINK_10 idiomatic-error-handling adjustment"
thresholds:
  cognitive_complexity: {warn: 20, fail: 60}
  cyclomatic_complexity: {warn: 15, fail: 30}
scalar_thresholds:
  wmc: 25
  cbo: 9
  max_efferent: 10
  loc_file_critical: 800
severity_confidence:
  global_dead_code: HIGH   # statically compiled: dead code is provable, not heuristic
