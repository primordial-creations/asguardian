# Generic-default profile plane (Plan 05 Sec.3.1).
#
# Fallback layer of the resolution chain (project override -> language
# profile -> generic defaults) - used when a file's language has no
# dedicated profile yet, or a language profile omits a metric. Values are
# seeded from Bragi's pre-existing hardcoded constants (a pure refactor by
# construction: identical numbers, now with provenance).
language: generic
provenance: "seeded from pre-existing Bragi hardcoded constants, 2026 uplift"
thresholds:
  cognitive_complexity: {warn: 15, fail: 50}
  cyclomatic_complexity: {warn: 10, fail: 20}
scalar_thresholds:
  wmc: 20
  cbo: 9
  max_efferent: 10
  loc_file_critical: 600
severity_confidence: {}
