# JavaScript/TypeScript taint benchmark corpus (plan 04 Phase 4; plan 01
# wave 2 acceptance gate: migrated rules must ship benchmark corpus cases).
#
# Each fixture is scanned in isolation through DispatchEngine.scan_file and
# checked against the expected outcome:
#   expect: flow     -> exactly `count` flows, with the given bucket/severity
#   expect: no_flow  -> zero flows (parameterized queries, exact sanitizers,
#                       constant-only concatenation)
cases:
  - file: tp_sqli_concat.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-89
  - file: tp_command_injection.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-78
  - file: tp_dom_xss_innerhtml.js
    expect: flow
    count: 1
    severity: high
    bucket_in: [certain, probable]
    cwe: CWE-79
  - file: fp_parameterized_query.js
    expect: no_flow
  - file: fp_exact_sanitizer.js
    expect: no_flow
  - file: fp_constant_concat.js
    expect: no_flow
  - file: tp_path_traversal.js
    expect: flow
    count: 1
    severity: high
    bucket_in: [certain, probable]
    cwe: CWE-22
  - file: fp_path_traversal_normalized.js
    expect: no_flow
  # Open redirect (CWE-601) is the closest SSRF-family sink this engine
  # models -- see corpus/taint/manifest.yml for the same note on Python.
  - file: tp_open_redirect.js
    expect: flow
    count: 1
    severity: medium
    bucket_in: [certain, probable]
    cwe: CWE-601
  - file: fp_redirect_constant.js
    expect: no_flow
  # -- Import/alias resolution + inter-procedural summaries (plan 04 gap) --
  - file: tp_aliased_require_command_injection.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-78
  - file: tp_import_alias_command_injection.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-78
  - file: tp_cross_function_same_file.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-89
  - file: tp_cross_file_sqli.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-89
  - file: fp_resolved_library_sanitizer.js
    expect: no_flow
  - file: tp_local_shadow_sanitizer.js
    expect: flow
    count: 1
    severity: high
    bucket_in: [possible]
    cwe: CWE-79
  # -- Adversarial-review regressions (3 confirmed real-injection-muting
  # bugs) -- see test_taint_cst_alias_summaries_adversarial.py for the
  # BLOCKER-2 (cross-directory forwarding) repro, which cannot be expressed
  # as a manifest flow-count case (see that file's docstring).
  - file: tp_relative_import_noop_sanitizer.js
    expect: flow
    count: 1
    severity: high
    bucket_in: [possible]
    cwe: CWE-79
  - file: tp_inline_require_command_injection.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-78
  # -- SSRF (CWE-918) -- a dedicated sink type now exists (see
  # TaintSinkType.SSRF); the "no dedicated SSRF sink" note above
  # (tp_open_redirect.js) predates this and only applies to open-redirect.
  - file: tp_ssrf_fetch.js
    expect: flow
    count: 1
    severity: high
    bucket_in: [certain, probable]
    cwe: CWE-918
  - file: fp_ssrf_fixed_url.js
    expect: no_flow
  # -- WS5 dynamic-construct surfacing (JS): eval/dynamic-dispatch/dynamic
  # require reached with a non-constant operand must surface a
  # needs-review dynamic_construct finding (CWE-470); a statically-constant
  # operand must not flag. --
  # eval(code) with a tainted operand ALSO matches the concrete
  # "eval_exec" sink (CWE-95); MAJOR-2 (adversarial review) -- a call site
  # that already produced a concrete sink finding must not ALSO emit a
  # redundant WS5 dynamic_construct finding for the same node, so this
  # reports exactly 1 flow (the concrete eval_exec finding), not 2.
  - file: tp_dynamic_eval_construct.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-95
  - file: fp_dynamic_eval_constant.js
    expect: no_flow
  - file: tp_dynamic_dispatch_construct.js
    expect: flow
    count: 1
    severity: high
    bucket_in: [needs_review]
    cwe: CWE-470
    finding_class: dynamic_construct
  - file: fp_dynamic_dispatch_constant_key.js
    expect: no_flow
  - file: tp_dynamic_require_construct.js
    expect: flow
    count: 1
    severity: high
    bucket_in: [needs_review]
    cwe: CWE-470
    finding_class: dynamic_construct
  # -- ROOT CAUSE / BLOCKER-3, BLOCKER-4 regressions (adversarial review,
  # reviewer's exact repros). --
  # `new Function(taint)` -- BLOCKER-3's fix (adding `new_expression`
  # handling to `_walk`/`_node_chain`) makes this call visible; it then
  # resolves through the PRE-EXISTING concrete "eval_exec" sink entry for
  # `Function` (catalog/sinks.py), not the dynamic_construct path -- per
  # MAJOR-2's rule (a call site with a concrete sink match must not ALSO
  # emit a redundant dynamic_construct finding), this is a deliberate,
  # correct deviation from treating it as a dynamic_construct finding.
  - file: tp_new_function_dynamic_construct.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [probable, certain]
    cwe: CWE-95
  # `import(userVar)` -- a dynamic `import()` call (BLOCKER-4's fix: a
  # `_node_chain` branch for the "import" leaf node type). No concrete
  # sink exists for it, so it surfaces the needs-review dynamic_construct
  # finding.
  - file: tp_dynamic_import_call_construct.js
    expect: flow
    count: 1
    severity: high
    bucket_in: [needs_review]
    cwe: CWE-470
    finding_class: dynamic_construct
  # -- Context-coverage regression pin (adversarial review): the CST
  # walker's generic child-recursion already reaches call_expression
  # nodes inside an `if` test (unlike the Python ast.NodeVisitor path,
  # which needed an explicit fix) -- this pins that behavior. --
  - file: tp_dynamic_eval_if_test_context.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-95

  # SA1 -- field/attribute/container sensitivity (StaticDepth Wave 1)
  - file: tp_sa1_attribute_same_field_flags.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-89
  - file: fp_sa1_attribute_sibling_field_clean.js
    expect: no_flow
  - file: tp_sa1_dict_const_key_same_key_flags.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-89
  - file: fp_sa1_dict_const_key_sibling_key_clean.js
    expect: no_flow
  - file: tp_sa1_dict_nonconstant_index_overapprox.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-89
