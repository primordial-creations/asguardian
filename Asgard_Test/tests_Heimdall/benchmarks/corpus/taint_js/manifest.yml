# JavaScript/TypeScript taint benchmark corpus (plan 04 Phase 4; plan 01
# wave 2 acceptance gate: migrated rules must ship benchmark corpus cases).
#
# Each fixture is scanned in isolation through DispatchEngine.scan_file and
# checked against the expected outcome:
#   expect: flow     -> exactly `count` flows, with the given bucket/severity
#   expect: no_flow  -> zero flows (parameterized queries, exact sanitizers,
#                       constant-only concatenation)
cases:
  - file: tp_sqli_concat.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-89
  - file: tp_command_injection.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-78
  - file: tp_dom_xss_innerhtml.js
    expect: flow
    count: 1
    severity: high
    bucket_in: [certain, probable]
    cwe: CWE-79
  - file: fp_parameterized_query.js
    expect: no_flow
  - file: fp_exact_sanitizer.js
    expect: no_flow
  - file: fp_constant_concat.js
    expect: no_flow
  - file: tp_path_traversal.js
    expect: flow
    count: 1
    severity: high
    bucket_in: [certain, probable]
    cwe: CWE-22
  - file: fp_path_traversal_normalized.js
    expect: no_flow
  # Open redirect (CWE-601) is the closest SSRF-family sink this engine
  # models -- see corpus/taint/manifest.yml for the same note on Python.
  - file: tp_open_redirect.js
    expect: flow
    count: 1
    severity: medium
    bucket_in: [certain, probable]
    cwe: CWE-601
  - file: fp_redirect_constant.js
    expect: no_flow
  # -- Import/alias resolution + inter-procedural summaries (plan 04 gap) --
  - file: tp_aliased_require_command_injection.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-78
  - file: tp_import_alias_command_injection.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-78
  - file: tp_cross_function_same_file.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-89
  - file: tp_cross_file_sqli.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-89
  - file: fp_resolved_library_sanitizer.js
    expect: no_flow
  - file: tp_local_shadow_sanitizer.js
    expect: flow
    count: 1
    severity: high
    bucket_in: [possible]
    cwe: CWE-79
  # -- Adversarial-review regressions (3 confirmed real-injection-muting
  # bugs) -- see test_taint_cst_alias_summaries_adversarial.py for the
  # BLOCKER-2 (cross-directory forwarding) repro, which cannot be expressed
  # as a manifest flow-count case (see that file's docstring).
  - file: tp_relative_import_noop_sanitizer.js
    expect: flow
    count: 1
    severity: high
    bucket_in: [possible]
    cwe: CWE-79
  - file: tp_inline_require_command_injection.js
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-78
