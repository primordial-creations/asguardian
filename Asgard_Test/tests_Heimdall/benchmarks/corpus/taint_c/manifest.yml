# C taint benchmark corpus (Asgard uplift: Go/C/SSRF/TS-cast slice).
# DispatchEngine routes .c/.h files through the tree-sitter CST taint path
# (Security/TaintAnalysis/engine/cst_taint_visitor.py::scan_c_source).
#
# BOUNDED FIRST PASS -- honest scope limits (see cst_taint_visitor.py's
# scan_c_source docstring and catalog/sources.py's C_SOURCE_SPECS comment):
#   - Intra-procedural only. SA3 (Wave 2) replaced the WS2 "points-to lite"
#     with a Steensgaard-style (union-find-based) points-to: multi-level
#     pointer dereference, struct-pointer field aliasing (including
#     aliasing of the pointer itself, e.g. `t = s;`), array decay, and a
#     never-mute over-approximation fallback for unresolved pointer RHS
#     (pointer arithmetic/casts/opaque call results) are all tracked -- see
#     the "SA3 C points-to (Steensgaard-lite)" section of
#     cst_taint_visitor.py. Still intra-procedural only: no cross-function
#     pointer flow, and variable identity IS the abstract location (a
#     sound but occasionally imprecise conflation of "aliases" and "points
#     to") -- documented residue, not silently punted.
#   - "Mutating sources" (fgets/scanf/read/recv/gets tainting an OUTPUT
#     ARGUMENT rather than a return value) ARE modeled -- see
#     _C_MUTATING_SOURCES in cst_taint_visitor.py (adversarial review
#     BLOCKER fix) -- the buffer/scanf-target argument becomes tainted in
#     the local env, and now flows through the SA3 points-to graph.
cases:
  - file: tp_command_injection.c
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-78
  - file: fp_command_fixed.c
    expect: no_flow
  - file: tp_buffer_overflow_sprintf.c
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-120
  - file: fp_buffer_overflow_fixed.c
    expect: no_flow
  - file: tp_path_traversal.c
    expect: flow
    count: 1
    severity: high
    bucket_in: [possible, probable, certain]
    cwe: CWE-22
  - file: fp_path_fixed.c
    expect: no_flow
  - file: fp_int_sanitizer.c
    expect: no_flow
  # -- Mutating source (adversarial review BLOCKER): fgets() writes stdin
  # data into buf; system(buf) must flag -- textbook C RCE class. --
  - file: tp_mutating_source_stdin_command_injection.c
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-78
  # -- FORMAT_STRING precision (adversarial review MAJOR-3): a constant
  # format literal with only a VALUE argument tainted is not a
  # format-string vulnerability; snprintf is bounded and must not flag
  # as buffer_overflow either. --
  - file: fp_format_string_constant.c
    expect: no_flow
  - file: tp_format_string_tainted_format.c
    expect: flow
    count: 1
    severity: high
    bucket_in: [certain, probable]
    cwe: CWE-134
  # -- WS2 pointer aliasing (intra-procedural points-to-lite): `char *p =
  # buf;` then `fgets(buf, ...)` taints buf as a mutating-source output
  # argument; `system(p)` must resolve `p` back to `buf` via the alias
  # group and flag. Without alias tracking this was a false negative. --
  - file: tp_pointer_alias_command_injection.c
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-78
  - file: fp_pointer_alias_unaliased_safe.c
    expect: no_flow
  # -- MAJOR-1 (adversarial review): a pointer directly reassigned to a
  # constant literal in straight-line code, dominating the sink, must be
  # a strong update that clears its taint -- reporting a provably-clean
  # value as CERTAIN command injection is a trust-killer. --
  - file: fp_pointer_alias_reassigned_constant.c
    expect: no_flow
  # -- WS4 C format-arg generalization: `vsnprintf` (a `v`-prefixed
  # va_list variant) must resolve to the same format-string argument
  # index as its non-`v` counterpart `snprintf` and flag a tainted format
  # string. --
  - file: tp_format_string_vsnprintf_tainted_format.c
    expect: flow
    count: 1
    severity: high
    bucket_in: [possible, probable, certain]
    cwe: CWE-134
  # -- SA3 (Wave 2): real Steensgaard-style points-to. Multi-level pointer
  # dereference (`char **pp = &p; ...; system(*pp);`) -- before SA3,
  # `pointer_expression` (tree-sitter-c's node type for both `&x` and
  # `*p`) had no case in `_eval` and silently evaluated to no taint,
  # regardless of the alias union already linking `pp`/`p`/`buf`. --
  - file: tp_pointer_multilevel_deref.c
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-78
  - file: fp_pointer_multilevel_deref_safe.c
    expect: no_flow
  # -- SA3: struct-pointer field aliasing. `s->field = tainted;` followed
  # by `t = s;` (a pointer copy unioning t/s's alias groups) must make
  # `t->field` visible as tainted -- requires the alias-group canonical
  # root migration in `_add_alias`/`_chain_path`, not just Wave 1's
  # single-pointer field-sensitivity. --
  - file: tp_pointer_struct_field_alias.c
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-78
  - file: fp_pointer_struct_field_alias_safe.c
    expect: no_flow
  # -- SA3 acceptance matrix: array decay (`char arr[N]; char *p = arr;`)
  # explicitly asserted as part of the Steensgaard-lite points-to slice
  # (already covered mechanically by the WS2 baseline's bare-identifier
  # alias rule; this pins it down as a named SA3 case). --
  - file: tp_pointer_array_decay_alias.c
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-78
  - file: fp_pointer_array_decay_alias_safe.c
    expect: no_flow
  # -- SA3 never-mute guard: an "unresolved"/unknown pointer (pointer
  # arithmetic `buf + 1`, outside the bare-identifier/address-of alias
  # shape) must still over-approximate and flag, never silently assert
  # clean -- `p` is conservatively unioned with every identifier in the
  # RHS. Confidence is decayed (probable, not certain) since the exact
  # aliasing is inferred rather than a direct copy. --
  - file: tp_pointer_unknown_arithmetic_overapprox.c
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-78
  # -- FP guard: the unresolved-RHS alias fallback is gated on
  # `is_pointer_decl` (derived from the pointer_declarator syntax / prior
  # pointer tracking) and must NEVER fire for plain scalar (`int`)
  # arithmetic, nor cross-contaminate an unrelated safe pointer. --
  - file: fp_pointer_unaliased_scalar_arithmetic_safe.c
    expect: no_flow
