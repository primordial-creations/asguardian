# C taint benchmark corpus (Asgard uplift: Go/C/SSRF/TS-cast slice).
# DispatchEngine routes .c/.h files through the tree-sitter CST taint path
# (Security/TaintAnalysis/engine/cst_taint_visitor.py::scan_c_source).
#
# BOUNDED FIRST PASS -- honest scope limits (see cst_taint_visitor.py's
# scan_c_source docstring and catalog/sources.py's C_SOURCE_SPECS comment):
#   - Intra-procedural only, no pointer-aliasing/memory-layout modeling.
#   - "Mutating sources" (fgets/scanf/read/recv/gets tainting an OUTPUT
#     ARGUMENT rather than a return value) are NOT modeled -- only
#     return-value sources (getenv) are covered in this pass.
cases:
  - file: tp_command_injection.c
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-78
  - file: fp_command_fixed.c
    expect: no_flow
  - file: tp_buffer_overflow_sprintf.c
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-120
  - file: fp_buffer_overflow_fixed.c
    expect: no_flow
  - file: tp_path_traversal.c
    expect: flow
    count: 1
    severity: high
    bucket_in: [possible, probable, certain]
    cwe: CWE-22
  - file: fp_path_fixed.c
    expect: no_flow
  - file: fp_int_sanitizer.c
    expect: no_flow
