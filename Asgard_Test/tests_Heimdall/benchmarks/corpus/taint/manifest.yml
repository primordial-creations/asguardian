# Taint benchmark corpus (plan 04 Testing / plan 01 acceptance gate).
#
# Each case names a fixture file and the expected outcome:
#   expect: flow      -> exactly `count` flows, with the given bucket/severity
#   expect: no_flow   -> zero flows at default reporting confidence (>= 0.25)
#
# Fixture pairs are deliberate TP/FP siblings per the DEEPTHINK_01 category
# list; new AST/taint-migrated rules must add cases here.
cases:
  - file: tp_fstring_sqli_decoupled.py
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-89
  - file: tp_format_sqli.py
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-89
  - file: fp_constant_fstring_sql.py
    expect: no_flow
  - file: fp_safe_path_join.py
    expect: no_flow
  - file: tp_command_injection_shell_true.py
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain]
    cwe: CWE-78
  - file: fp_command_shell_false.py
    expect: no_flow
  - file: tp_cross_function_sqli.py
    expect: flow
    count: 1
    severity: critical
    bucket_in: [probable, certain]
    cwe: CWE-89
  - file: fp_parameterized_query.py
    expect: no_flow
  - file: fp_exact_sanitizer.py
    expect: no_flow
  - file: tp_heuristic_sanitizer_kept.py
    expect: flow
    count: 1
    severity: critical
    bucket_in: [possible]
    cwe: CWE-89
  - file: tp_path_traversal_open.py
    expect: flow
    count: 1
    severity: high
    bucket_in: [certain, probable]
    cwe: CWE-22
  - file: fp_path_traversal_basename.py
    expect: no_flow
  - file: tp_pickle_deserialization.py
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-95
  - file: fp_json_safe_deserialization.py
    expect: no_flow
  - file: tp_open_redirect.py
    expect: flow
    count: 1
    severity: medium
    bucket_in: [certain, probable]
    cwe: CWE-601
  - file: fp_redirect_constant.py
    expect: no_flow
  # SSRF (CWE-918) now has a dedicated sink type (TaintSinkType.SSRF, see
  # Asgard/Heimdall/Security/TaintAnalysis/catalog/sinks.py SSRF entries).
  # The prior note here ("open redirect is the closest stand-in, no
  # dedicated SSRF sink exists") is stale as of the SSRF sink-category
  # addition -- kept only in tp_open_redirect.py's own docstring for
  # historical context, not repeated here.
  - file: tp_ssrf_requests_get.py
    expect: flow
    count: 1
    severity: high
    bucket_in: [certain, probable]
    cwe: CWE-918
  - file: fp_ssrf_fixed_url.py
    expect: no_flow
  # -- WS5 dynamic-construct surfacing (Python): eval/getattr-dispatch/
  # __import__ reached with a non-constant operand must surface a
  # needs-review dynamic_construct finding (CWE-470); a statically-constant
  # operand must not flag. --
  # eval(code) with a tainted operand ALSO matches the concrete
  # "eval_exec" sink (CWE-95); MAJOR-2 (adversarial review) -- a call site
  # that already produced a concrete sink finding must not ALSO emit a
  # redundant WS5 dynamic_construct finding for the same node, so this
  # reports exactly 1 flow (the concrete eval_exec finding), not 2.
  - file: tp_dynamic_eval_construct.py
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-95
  - file: fp_dynamic_eval_constant.py
    expect: no_flow
  - file: tp_dynamic_getattr_dispatch_construct.py
    expect: flow
    count: 1
    severity: high
    bucket_in: [needs_review]
    cwe: CWE-470
    finding_class: dynamic_construct
  - file: fp_dynamic_getattr_dispatch_constant.py
    expect: no_flow
  - file: tp_dynamic_import_construct.py
    expect: flow
    count: 1
    severity: high
    bucket_in: [needs_review]
    cwe: CWE-470
    finding_class: dynamic_construct
  # -- ROOT CAUSE regressions (adversarial review BLOCKER-1/BLOCKER-2,
  # reviewer's exact repros): a pure dynamic construct with NO co-located
  # registered sink was never triggering Layer 3 at all -- see
  # dispatch.py's `_PY_DYNAMIC_TRIGGER_NAMES`/`_layer2_triggers`. --
  - file: tp_dynamic_getattr_dispatch_construct_adversarial.py
    expect: flow
    count: 1
    severity: high
    bucket_in: [needs_review]
    cwe: CWE-470
    finding_class: dynamic_construct
  - file: tp_dynamic_import_construct_adversarial.py
    expect: flow
    count: 1
    severity: high
    bucket_in: [needs_review]
    cwe: CWE-470
    finding_class: dynamic_construct
  # -- Context-coverage regressions (adversarial review, reviewer's exact
  # repros): visit_Return/visit_If/visit_While/visit_For previously only
  # ran `_eval` on their expression (test/value/iter), never dispatching
  # to `visit_Call` -- a dynamic construct that ONLY ever appeared in a
  # `return`, `if`/`while` test, or `for ... in` iterable was silently
  # never checked. --
  - file: tp_dynamic_getattr_dispatch_return_context.py
    expect: flow
    count: 1
    severity: high
    bucket_in: [needs_review]
    cwe: CWE-470
    finding_class: dynamic_construct
  - file: tp_dynamic_import_return_context.py
    expect: flow
    count: 1
    severity: high
    bucket_in: [needs_review]
    cwe: CWE-470
    finding_class: dynamic_construct
  - file: fp_dynamic_getattr_dispatch_return_constant.py
    expect: no_flow
  - file: tp_dynamic_eval_if_test_context.py
    expect: flow
    count: 1
    severity: critical
    bucket_in: [certain, probable]
    cwe: CWE-95

