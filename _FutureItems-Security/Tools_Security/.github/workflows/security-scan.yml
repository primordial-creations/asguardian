name: Security Scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run weekly security scan
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  security-scan:
    name: Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run Security Scan
        id: security-scan
        run: |
          cd security-tools
          python security_api.py all . -f sarif -o ../results.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: security-toolkit

      - name: Generate JSON Report
        run: |
          cd security-tools
          python security_api.py all . -f json -o ../security-report.json

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.json

      - name: Check for Critical Issues
        run: |
          CRITICAL=$(cat security-report.json | python -c "
          import json, sys
          data = json.load(sys.stdin)
          critical = sum(
            s.get('by_severity', {}).get('CRITICAL', 0)
            for s in data.get('scans', {}).values()
          )
          print(critical)
          ")
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical security issues!"
            exit 1
          fi

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan for secrets
        run: |
          cd security-tools
          python secrets_scanner.py ..
          exit_code=$?
          if [ $exit_code -eq 2 ]; then
            echo "::error::Critical secrets found in codebase!"
            exit 1
          fi

  dependency-check:
    name: Dependency Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check dependencies
        run: |
          cd security-tools
          python dependency_checker.py ..
        continue-on-error: true

  code-quality:
    name: Code Security Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run code security scans
        run: |
          cd security-tools
          echo "=== SQL Injection Scan ==="
          python sql_injection_scanner.py .. || true
          echo ""
          echo "=== XSS Scan ==="
          python xss_scanner.py .. || true
          echo ""
          echo "=== Command Injection Scan ==="
          python command_injection_scanner.py .. || true

  test-scanners:
    name: Test Scanners
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          pip install pytest

      - name: Run scanner tests
        run: |
          cd security-tools
          pytest tests/ -v
